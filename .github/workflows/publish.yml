name: Publish Package to npmjs

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js and NPM Registry
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run common:compile && tsc

      - name: Verify @nuralyui/common build outputs
        run: |
          set -e
          ls -la packages/common/dist || (echo "common dist missing" && exit 1)
          for p in mixins controllers themes utils constants; do
            if [ ! -f "packages/common/dist/$p/index.js" ]; then
              echo "Missing packages/common/dist/$p/index.js" && exit 1
            fi
          done

      - name: Build Component Bundles
        run: npm run roll

      - name: Build Workspace Packages
        run: npm run packages:build

      - name: Upload coverage results to Codecov.io
        uses: codecov/codecov-action@v2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          version: 'v0.1.15'

      - name: Configure npm authentication
        run: |
          npm config set //registry.npmjs.org/:_authToken $NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nuraly/lumenui
        run: |
          npm install -g publish-if-not-published
          echo "Publishing @nuraly/lumenui..."
          publish-if-not-published -- --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
